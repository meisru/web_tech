{% extends "layouts/base.html" %}
{% block title %}Lab10 Part1 – Edit Book{% endblock title %}
{% block stylesheets %}
<style>
    form { max-width: 480px; margin-top: 1rem; }
    label { display: block; margin-top: 10px; font-weight: bold; }
    input { width: 100%; padding: 6px 8px; box-sizing: border-box; }
    .btn { display: inline-block; padding: 6px 16px; text-decoration: none; border-radius: 4px; font-size: 14px; border: none; cursor: pointer; }
    .btn-save   { background-color: #008CBA; color: #fff; }
    .btn-cancel { background-color: #aaa; color: #fff; }
</style>
{% endblock stylesheets %}
{% block content %}
<h1>Edit Book (ID: {{ book.id }})</h1>
<form method="post" action="{% url 'books.lab10_part1_editbook' book.id %}">
    {% csrf_token %}
    <label for="title">Title</label>
    <input type="text" id="title" name="title" value="{{ book.title }}" required>

    <label for="price">Price</label>
    <input type="number" id="price" name="price" step="0.01" min="0" value="{{ book.price }}" required>

    <label for="quantity">Quantity</label>
    <input type="number" id="quantity" name="quantity" min="0" value="{{ book.quantity }}" required>

    <label for="pubdate">Publication Date</label>
    <input type="date" id="pubdate" name="pubdate" value="{{ book.pubdate|date:'Y-m-d' }}">

    <label for="rating">Rating (1–5)</label>
    <input type="number" id="rating" name="rating" min="1" max="5" value="{{ book.rating }}" required>

    <label for="author_id">Author</label>
    <select id="author_id" name="author_id" required style="width:100%;padding:6px 8px;">
        {% for author in authors %}
        <option value="{{ author.id }}" {% if author in book.authors.all %}selected{% endif %}>{{ author.name }}</option>
        {% endfor %}
    </select>

    <div style="margin-top: 16px;">
        <button type="submit" class="btn btn-save">Save</button>
        <a class="btn btn-cancel" href="{% url 'books.lab10_part1_listbooks' %}">Cancel</a>
    </div>
</form>
{% endblock content %}
